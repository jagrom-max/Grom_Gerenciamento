services:
  app:
    build:
      context: .
      dockerfile: php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../runtime:/var/www/html
    environment:
      APP_NAME: GROM Web
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      APP_TIMEZONE: America/Sao_Paulo
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: grom_web
      DB_USERNAME: grom_app
      DB_PASSWORD: change-me
      DB_SSLMODE: disable
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: php/Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    volumes:
      - ../runtime:/var/www/html
    environment:
      APP_NAME: GROM Web
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      APP_TIMEZONE: America/Sao_Paulo
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: grom_web
      DB_USERNAME: grom_app
      DB_PASSWORD: change-me
      DB_SSLMODE: disable
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: php/Dockerfile
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ../runtime:/var/www/html
    environment:
      APP_NAME: GROM Web
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      APP_TIMEZONE: America/Sao_Paulo
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: grom_web
      DB_USERNAME: grom_app
      DB_PASSWORD: change-me
      DB_SSLMODE: disable
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../runtime:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: grom_web
      POSTGRES_USER: grom_app
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grom_app -d grom_web"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
